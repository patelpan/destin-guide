<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Oasis Guest Guide QR</title>
<meta name="description" content="QR landing page for Elemental Oasis guests to open the Destin guest guide and PDF guide.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0d6e63">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Hanken+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--sand:#f6efe2;--ink:#23312e;--emerald:#0d6e63;--emerald-deep:#0a4f48;--coral:#e06a4a;--paper:#fffdf8;--line:#d9cdb4}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;background:radial-gradient(120% 80% at 80% 0%, rgba(13,110,99,.16), transparent 55%),var(--sand);font-family:'Hanken Grotesk',sans-serif;color:var(--ink)}main{width:min(100%,560px);background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:32px;text-align:center;box-shadow:0 18px 60px rgba(35,49,46,.12)}.logo{width:90px;height:auto;border-radius:50%;margin-bottom:14px}h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(2rem,8vw,3.2rem);line-height:1;margin:0 0 12px;color:var(--emerald-deep)}p{font-size:1.05rem;margin:0 auto 22px;max-width:36ch}.qr{width:min(78vw,260px);height:auto;background:white;border-radius:18px;padding:12px;border:1px solid var(--line);margin:6px auto 24px}.actions{display:grid;gap:12px}.btn{display:block;text-decoration:none;background:var(--emerald-deep);color:#fff;border-radius:999px;padding:14px 18px;font-weight:800}.btn.secondary{background:transparent;color:var(--emerald-deep);border:1px solid var(--emerald-deep)}.note{font-size:.86rem;opacity:.74;margin-top:18px;margin-bottom:0}@media(max-width:520px){main{padding:26px 20px;border-radius:22px}.actions{gap:10px}.btn{padding:13px 16px}}
</style>
</head>
<body>
<main>
<img class="logo" src="elemental-oasis-logo.jpg" alt="Elemental Oasis logo" width="409" height="413">
<h1>Elemental Oasis</h1>
<p>Scan or tap below to open the Destin guest guide.</p>
<img class="qr" src="guest-guide-qr.png" alt="QR code for the Elemental Oasis guest guide" width="396" height="396">
<div class="actions">
<a class="btn" href="./">Open Guest Guide</a>
<a class="btn secondary" href="./guest-guide.pdf" target="_blank" rel="noopener">View PDF Guide</a>
</div>
<p class="note">Best viewed on a phone before heading to the beach, pool, dining, or local activities.</p>
</main>
</body>
</html>
